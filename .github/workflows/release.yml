name: Release App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-13
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-3 \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xinput0

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: |
          chmod +x scripts/build_linux.sh
          PYTHON_BIN=python PLATFORM=linux ./scripts/build_linux.sh

      - name: Build on macOS
        if: runner.os == 'macOS'
        run: |
          chmod +x scripts/build_macos.sh
          PYTHON_BIN=python PLATFORM=macos ./scripts/build_macos.sh

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/build_windows.ps1 -PythonExe python -AppName wildcam -EntryPoint main.py

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*_${{ matrix.platform }}_*.zip
          generate_release_notes: true
