name: Build App

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and release, e.g. v1.0.0"
        required: true
        type: string
      source_ref:
        description: "Branch, tag or commit to tag and build"
        required: true
        default: "master"
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.prepare.outputs.tag }}
      target_sha: ${{ steps.prepare.outputs.target_sha }}
    steps:
      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Create tag if missing
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"

          git fetch --tags --force
          TARGET_SHA="$(git rev-parse HEAD)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git tag "$TAG" "$TARGET_SHA"
            git push origin "refs/tags/$TAG"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-15
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            libdbus-1-3 \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xinput0

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: |
          chmod +x scripts/build_linux.sh
          PYTHON_BIN=python PLATFORM=linux APP_VERSION=${{ needs.prepare.outputs.tag }} ./scripts/build_linux.sh

      - name: Build on macOS
        if: runner.os == 'macOS'
        run: |
          chmod +x scripts/build_macos.sh
          PYTHON_BIN=python PLATFORM=macos ./scripts/build_macos.sh

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/build_windows.ps1 -PythonExe python -AppName wildcam -EntryPoint main.py

      - name: Upload Linux build artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: wildcam-${{ matrix.platform }}
          path: |
            dist/*_${{ matrix.platform }}_*.zip
            dist/*_${{ matrix.platform }}_*.AppImage
          if-no-files-found: error

      - name: Upload non-Linux build artifacts
        if: runner.os != 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: wildcam-${{ matrix.platform }}
          path: dist/*_${{ matrix.platform }}_*.zip
          if-no-files-found: error

      - name: Publish Linux release assets
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.target_sha }}
          files: |
            dist/*_${{ matrix.platform }}_*.zip
            dist/*_${{ matrix.platform }}_*.AppImage
          generate_release_notes: true

      - name: Publish non-Linux release assets
        if: runner.os != 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.target_sha }}
          files: dist/*_${{ matrix.platform }}_*.zip
          generate_release_notes: true
